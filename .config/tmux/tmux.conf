# tmux config — works on both mac and gruffalo.
# Deploy: cp to ~/.config/tmux/tmux.conf (tmux >= 3.1 reads it there).
# NB on the mac, every ghostty tab runs bin/tmux-ghostty-tab (command= in
# the ghostty config): first tab = persistent 'main' session, extra tabs
# get independent throwaway sessions (Ctrl-D closes shell+tab; Cmd-W
# kills the tab's session; only 'main' survives closing).

# prefix: C-a (one line to change back to C-b if muscle memory disagrees)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- core behavior -----------------------------------------------------
set -sg escape-time 10          # no Esc delay: zsh-vi-mode + nvim terminal Esc
set -g focus-events on          # nvim autoread/gitsigns see focus changes
set -g history-limit 50000
set -g mouse on                 # wheel scrolls (enters copy mode), drag resizes
set -g base-index 1             # windows number from 1; 0 is a long reach
setw -g pane-base-index 1
set -g renumber-windows on

# --- true color passthrough so catppuccin renders correctly in nvim ----
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"

# --- clipboard: pass OSC52 through (cluster nvim yanks -> local clipboard)
set -g set-clipboard on

# --- forward session name + pane title (user@host from shell
# integration / ssh) to the outer terminal, so ghostty tabs are labelled
# and distinguishable (main vs numbered ephemeral tabs)
set -g set-titles on
set -g set-titles-string "#S · #T"

# --- vi copy mode: the reason we're here -------------------------------
# prefix+[ (or prefix+v) enters copy mode; then hjkl/w/b//-search to move,
# v anchors a selection, V linewise, C-v rectangle, y yanks and exits.
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# --- splits and new windows inherit the current directory --------------
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# more memorable split keys as well
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- status line: vim-tpipeline embeds nvim's lualine here -------------
# The nvim plugin writes its rendered statusline to a "vimbridge" file
# next to the tmux socket; tmux cats it. When no nvim is running the
# left/right slots are empty and only the (centred) window list shows.
set -g status-style "bg=default"
set -g status-justify absolute-centre
set -g status-left-length 120
set -g status-right-length 120
set -g status-left '#(cat #{socket_path}-\#{session_id}-vimbridge)'
# tpipeline right half, then the session name so every tab's bar shows
# which session it is (main vs ephemeral) with or without nvim running
set -g status-right '#(cat #{socket_path}-\#{session_id}-vimbridge-R)#[fg=#89b4fa,bold] #S '
# centred window list shows session:name (e.g. main:zsh vs 2:zsh) so
# every tab's bar is distinct; window index dropped since tabs normally
# hold one window (C-a 1-9 still jumps by index)
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6c7086] #S:#W "
setw -g window-status-current-format "#[fg=#cba6f7,bold] #S:#W "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"
setw -g mode-style "bg=#45475a,fg=#cdd6f4"   # copy-mode selection highlight
